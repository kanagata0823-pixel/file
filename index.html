<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内ドキュメント</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0f14;--surface:#13161e;--surface2:#1a1e28;--border:#232736;
--accent:#f59e0b;--accent2:#a78bfa;--text:#e2e8f0;--text-muted:#64748b;
--text-dim:#94a3b8;--green:#34d399;--hover:#1e2233;
--rail:#2a3045;--rail-active:#f59e0b;--glow:rgba(245,158,11,0.5);
}
html,body{height:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden}

header{height:52px;background:var(–surface);border-bottom:1px solid var(–border);display:flex;align-items:center;padding:0 20px;gap:12px}
.logo{font-family:‘DM Mono’,monospace;font-size:15px;font-weight:500;color:var(–accent);letter-spacing:.08em}
.logo span{color:var(–accent2)}
.header-sep{width:1px;height:20px;background:var(–border);margin:0 4px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;flex:1;overflow:hidden;white-space:nowrap}
.breadcrumb .crumb{color:var(–text-dim)}
.breadcrumb .crumb.active{color:var(–text)}
.breadcrumb .sep{color:var(–border)}

.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 52px);min-height:0;overflow:hidden}

/* ── Sidebar ── */
.sidebar{background:var(–surface);border-right:1px solid var(–border);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-title{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(–text-muted)}

.tree-scroll{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;min-height:0}
.tree-scroll::-webkit-scrollbar{width:4px}
.tree-scroll::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px}

#railSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:30;overflow:visible}

/* ── Slider pill ── */
#sliderPill{position:absolute;left:0;top:0;width:100%;height:34px;pointer-events:none;z-index:25;opacity:0;will-change:transform}
#sliderPill .pill-bg{position:absolute;left:2px;right:0;top:3px;bottom:3px;background:linear-gradient(90deg,rgba(245,158,11,0.22),rgba(245,158,11,0.07));border-left:2px solid var(–accent);border-radius:0 6px 6px 0}
#sliderPill .pill-shimmer{position:absolute;left:2px;right:0;top:3px;bottom:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07) 50%,transparent);border-radius:0 6px 6px 0;animation:shimmer 1s infinite linear}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
#sliderPill .pill-dot{position:absolute;left:-1px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(–accent);box-shadow:0 0 10px 4px var(–glow)}

/* ── Tree nodes ── */
#treeRoot{position:relative;z-index:1;padding:8px 0}
.node{user-select:none}
.node-row{display:flex;align-items:center;min-height:34px;height:34px;cursor:pointer;transition:background .12s,height .3s cubic-bezier(.34,1.2,.64,1),min-height .3s cubic-bezier(.34,1.2,.64,1);border-left:2px solid transparent;position:relative;overflow:hidden}
.node-row:hover{background:var(–hover)}
.node-row.selected{height:124px;min-height:124px;background:linear-gradient(90deg,rgba(245,158,11,0.13),rgba(245,158,11,0.04));border-left-color:var(–accent)}
.node-row .node-label{font-size:13px;color:var(–text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px;transition:color .2s,font-size .25s,font-weight .2s}
.node-row.selected .node-label{color:var(–text);font-size:30px;font-weight:500;white-space:normal;line-height:1.3}
.node-row .node-sub{position:absolute;bottom:8px;left:0;right:0;font-size:11px;color:var(–accent);font-family:‘DM Mono’,monospace;opacity:0;transform:translateY(4px);transition:opacity .25s .1s,transform .25s .1s;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-row.selected .node-sub{opacity:1;transform:translateY(0)}

.node-indent{flex-shrink:0;display:flex;align-items:flex-start;padding-top:10px}
.node-line-seg{width:20px;height:34px;position:relative;flex-shrink:0}
.node-line-seg::before{content:’’;position:absolute;left:10px;top:0;bottom:0;width:1.5px;background:var(–rail);transition:background .3s}
.node-line-seg.last::after{content:’’;position:absolute;left:10px;top:17px;width:10px;height:1.5px;background:var(–rail);transition:background .3s}
.node-line-seg.last::before{bottom:calc(100% - 17px)}
.node-line-seg.rail-lit::before{background:var(–rail-active);box-shadow:0 0 5px var(–glow)}
.node-line-seg.last.rail-lit::after{background:var(–rail-active);box-shadow:0 0 5px var(–glow)}

.chevron-wrap{width:20px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chevron{width:14px;height:14px;border-radius:3px;background:var(–surface2);border:1px solid var(–border);display:flex;align-items:center;justify-content:center;transition:transform .2s,background .15s}
.chevron svg{width:8px;height:8px;stroke:var(–text-muted)}
.node-row.selected .chevron{background:var(–accent);border-color:var(–accent)}
.node-row.selected .chevron svg{stroke:#0d0f14}
.chevron.open{transform:rotate(90deg)}
.leaf-icon{width:20px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.leaf-icon svg{width:12px;height:12px;stroke:var(–text-muted);transition:stroke .2s}
.node-row.selected .leaf-icon svg{stroke:var(–accent)}

.node-count{font-family:‘DM Mono’,monospace;font-size:10px;padding:1px 5px;border-radius:8px;background:var(–surface2);color:var(–text-muted);border:1px solid var(–border);margin-right:5px;flex-shrink:0}
.node-badge{font-size:10px;font-family:‘DM Mono’,monospace;padding:1px 6px;border-radius:10px;margin-right:10px;flex-shrink:0}
.badge-doc{background:rgba(245,158,11,.12);color:var(–accent);border:1px solid rgba(245,158,11,.25)}
.badge-folder{background:rgba(167,139,250,.1);color:var(–accent2);border:1px solid rgba(167,139,250,.15)}
.node-meta{display:flex;align-items:center;align-self:flex-start;padding-top:8px;gap:4px}
.node-children{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.node-children.open{max-height:2000px}

/* ── Main content area ── */
.main{display:flex;flex-direction:column;background:var(–bg);overflow:hidden;min-height:0}

.content-area{flex:1;overflow-y:auto;padding:36px 40px;min-height:0}
.content-area::-webkit-scrollbar{width:8px}
.content-area::-webkit-scrollbar-thumb{background:var(–border);border-radius:4px}

/* ── Document content styles ── */
.doc-wrap{opacity:0;transform:translateY(10px);transition:opacity .35s ease,transform .35s cubic-bezier(.34,1.2,.64,1);max-width:860px;margin:0 auto}
.doc-wrap.visible{opacity:1;transform:translateY(0)}

/* Typography for content */
.doc-wrap h1{font-size:24px;font-weight:700;color:var(–text);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(–border)}
.doc-wrap h2{font-size:18px;font-weight:600;color:var(–text);margin:28px 0 12px}
.doc-wrap h3{font-size:15px;font-weight:600;color:var(–text-dim);margin:20px 0 8px}
.doc-wrap p{font-size:14px;line-height:1.9;color:var(–text-dim);margin-bottom:14px}
.doc-wrap ul,.doc-wrap ol{padding-left:20px;margin-bottom:14px}
.doc-wrap li{font-size:14px;line-height:1.9;color:var(–text-dim);margin-bottom:4px}
.doc-wrap strong{color:var(–text);font-weight:600}
.doc-wrap em{color:var(–accent);font-style:normal}

/* Tables */
.doc-wrap table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.doc-wrap th{background:var(–surface2);color:var(–text);font-weight:600;padding:10px 14px;text-align:left;border:1px solid var(–border)}
.doc-wrap td{padding:9px 14px;border:1px solid var(–border);color:var(–text-dim);line-height:1.6}
.doc-wrap tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.doc-wrap tr:hover td{background:var(–hover)}

/* Callout box */
.doc-wrap .callout{background:rgba(245,158,11,0.08);border-left:3px solid var(–accent);padding:12px 16px;border-radius:0 6px 6px 0;margin:16px 0;font-size:13px;color:var(–text-dim);line-height:1.8}
.doc-wrap .callout strong{color:var(–accent)}

/* Tag chips */
.doc-wrap .tag{display:inline-block;background:var(–surface2);border:1px solid var(–border);color:var(–text-muted);font-size:11px;font-family:‘DM Mono’,monospace;padding:2px 8px;border-radius:10px;margin:2px}

/* Empty state */
.empty-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;opacity:.4;pointer-events:none}
.empty-msg svg{width:32px;height:32px;stroke:var(–text-muted)}
.empty-msg p{font-size:13px;color:var(–text-muted)}

/* ── Memo bar ── */
.memo-bar{flex-shrink:0;background:var(–surface);border-top:1px solid var(–border);display:flex;flex-direction:row;align-items:stretch}
.memo-label{font-size:11px;font-family:‘DM Mono’,monospace;color:var(–text-muted);letter-spacing:.08em;writing-mode:vertical-rl;padding:10px 8px;border-right:1px solid var(–border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(–surface2)}
.memo-area{flex:1;background:transparent;border:none;outline:none;resize:none;color:var(–text);font-size:13px;font-family:‘Noto Sans JP’,sans-serif;line-height:1.8;padding:10px 14px;height:120px;min-height:120px;max-height:120px}
.memo-area::placeholder{color:var(–text-muted)}

@media(max-width:640px){
.layout{grid-template-columns:1fr;grid-template-rows:40vh 1fr}
.sidebar{border-right:none;border-bottom:1px solid var(–border)}
.memo-bar{flex-direction:column}
.memo-label{writing-mode:horizontal-tb;border-right:none;border-bottom:1px solid var(–border);padding:6px 14px;justify-content:flex-start}
.content-area{padding:20px 16px}
}
</style>

</head>
<body>

<header>
<div class="logo">TREE<span>.</span>DOC</div>
<div class="header-sep"></div>
<div class="breadcrumb" id="breadcrumb"><span class="crumb active">ドキュメント</span></div>
</header>

<div class="layout">
<aside class="sidebar">
<div class="sidebar-header">
<span class="sidebar-title">ドキュメント</span>
</div>
<div class="tree-scroll" id="treeScroll">
<svg id="railSvg" height="600" width="300"></svg>
<div id="sliderPill">
<div class="pill-bg"></div>
<div class="pill-shimmer"></div>
<div class="pill-dot"></div>
</div>
<div id="treeRoot"></div>
</div>
</aside>

<main class="main">
<div class="content-area" id="contentArea">
<div class="empty-msg" id="emptyMsg">
<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
<p>左のツリーから文書を選択してください</p>
</div>
<div class="doc-wrap" id="docWrap"></div>
</div>

```
<div class="memo-bar">
<div class="memo-label">備考</div>
<textarea class="memo-area" id="memoArea" readonly></textarea>
</div>
```

</main>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 備考欄テキスト
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MEMO_TEXT = `ここに備考を入力してください。
複数行も記述できます。`;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ツリー構造とコンテンツの設定
//
// 111 = 親フォルダ → label と children を設定
// 222 = 子文書 → label と content（HTMLで記述）を設定
//
// contentの中では以下が使えます：
// <h1>大見出し</h1>
// <h2>中見出し</h2>
// <h3>小見出し</h3>
// <p>本文テキスト</p>
// <strong>太字</strong> <em>黄色強調</em>
// <ul><li>箇条書き</li></ul>
// <div class="callout"><strong>注意</strong> メモ書き</div>
// <table><tr><th>ヘッダ</th></tr><tr><td>セル</td></tr></table>
// <span class="tag">タグ</span>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const treeData = [

// 111 親フォルダ
{ id:1, label:'111', type:'folder', open:true, children:[

// 222 子文書
{ id:2, label:'222', type:'leaf', content:`
<h1>文書タイトルをここに</h1>
<p>本文をここに書きます。<strong>太字</strong>や<em>黄色強調</em>も使えます。</p>
<div class="callout"><strong>ポイント</strong> 重要な情報はこのボックスに書くと目立ちます。</div>
<h2>表の例</h2>
<table>
<tr><th>項目</th><th>内容</th><th>備考</th></tr>
<tr><td>サンプル1</td><td>内容1</td><td>備考1</td></tr>
<tr><td>サンプル2</td><td>内容2</td><td>備考2</td></tr>
</table>
`},

// 222 子文書
{ id:3, label:'222', type:'leaf', content:`
<h1>2つ目の文書</h1>
<p>内容をここに書きます。</p>
<ul>
<li>箇条書き1</li>
<li>箇条書き2</li>
<li>箇条書き3</li>
</ul>
`},

]},

// 111 親フォルダ
{ id:4, label:'111', type:'folder', open:false, children:[

// 222 子文書
{ id:5, label:'222', type:'leaf', content:`
<h1>別フォルダの文書</h1>
<p>内容をここに書きます。</p>
`},

]},

];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 以下は変更不要
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let selectedNodeId = null;
let sliderAnimRAF = null;

function findNode(nodes,id){for(const n of nodes){if(n.id===id)return n;if(n.children){const f=findNode(n.children,id);if(f)return f;}}return null;}
function countLeaves(n){if(n.type==='leaf')return 1;return(n.children||[]).reduce((s,c)=>s+countLeaves(c),0);}
function buildBreadcrumb(nodes,id,p=[]){for(const n of nodes){if(n.id===id)return[...p,n.label];if(n.children){const r=buildBreadcrumb(n.children,id,[...p,n.label]);if(r)return r;}}return null;}
function findPath(nodes,id,p=[]){for(const n of nodes){const np=[...p,n.id];if(n.id===id)return np;if(n.children){const r=findPath(n.children,id,np);if(r)return r;}}return null;}

function renderTree(hlPath){
document.getElementById('treeRoot').innerHTML='';
renderNodes(treeData,document.getElementById('treeRoot'),0,true,hlPath||[]);
updateSvgSize();
}
function renderNodes(nodes,container,depth,isRoot,hlPath){
nodes.forEach((n,i)=>container.appendChild(createNodeEl(n,depth,i===nodes.length-1,isRoot,hlPath)));
}
function createNodeEl(node,depth,isLast,isRoot,hlPath){
const wrapper=document.createElement('div');wrapper.className='node';
const isSel=selectedNodeId===node.id;
const row=document.createElement('div');row.className='node-row'+(isSel?' selected':'');row.id='nr-'+node.id;

const indent=document.createElement('div');indent.className='node-indent';indent.style.display='flex';
if(!isRoot){const p=document.createElement('div');p.style.width='16px';indent.appendChild(p);}
for(let i=0;i<depth-1;i++){const s=document.createElement('div');s.className='node-line-seg';indent.appendChild(s);}
if(depth>0){const s=document.createElement('div');s.className='node-line-seg last'+(hlPath.includes(node.id)?' rail-lit':'');indent.appendChild(s);}

if(node.type==='folder'){
const cw=document.createElement('div');cw.className='chevron-wrap';
const ch=document.createElement('div');ch.className='chevron'+(node.open?' open':'');
ch.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
cw.appendChild(ch);indent.appendChild(cw);
} else {
const li=document.createElement('div');li.className='leaf-icon';
li.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
indent.appendChild(li);
}
row.appendChild(indent);

const labelWrap=document.createElement('div');labelWrap.style.cssText='flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding-right:6px;min-width:0';
const label=document.createElement('div');label.className='node-label';label.textContent=node.label;labelWrap.appendChild(label);
const sub=document.createElement('div');sub.className='node-sub';sub.textContent=node.type==='folder'?countLeaves(node)+' 文書':'クリックして表示';
sub.style.paddingLeft=(depth>0?(isRoot?0:16)+depth*20+20:4)+'px';
labelWrap.appendChild(sub);
row.appendChild(labelWrap);

const meta=document.createElement('div');meta.className='node-meta';
if(node.type==='folder'){
const cnt=document.createElement('span');cnt.className='node-count';cnt.textContent=countLeaves(node);meta.appendChild(cnt);
const fb=document.createElement('span');fb.className='node-badge badge-folder';fb.textContent='フォルダ';meta.appendChild(fb);
} else {
const pb=document.createElement('span');pb.className='node-badge badge-doc';pb.textContent='DOC';meta.appendChild(pb);
}
row.appendChild(meta);
row.addEventListener('click',()=>handleNodeClick(node));
wrapper.appendChild(row);

if(node.type==='folder'&&node.children){
const cw=document.createElement('div');cw.className='node-children'+(node.open?' open':'');
renderNodes(node.children,cw,depth+1,false,hlPath);wrapper.appendChild(cw);
}
return wrapper;
}

function handleNodeClick(node){
const prevId=selectedNodeId;
selectedNodeId=node.id;
if(node.type==='folder')node.open=!node.open;
const path=findPath(treeData,node.id)||[];
path.slice(0,-1).forEach(id=>{const n=findNode(treeData,id);if(n&&n.type==='folder')n.open=true;});
renderTree(path);
requestAnimationFrame(()=>{
animateSlider(prevId,node.id,()=>{
renderTree(path);
updateBreadcrumb(node.id);
if(node.type==='leaf') showContent(node.content);
});
});
}

function showContent(html){
const wrap=document.getElementById('docWrap');
const empty=document.getElementById('emptyMsg');
wrap.classList.remove('visible');
empty.style.opacity='0';
setTimeout(()=>{
wrap.innerHTML=html||'';
empty.style.display='none';
setTimeout(()=>wrap.classList.add('visible'),30);
},180);
}

// ── Slider ──
function getRowTop(id){
const el=document.getElementById('nr-'+id);
const scroll=document.getElementById('treeScroll');
if(!el||!scroll)return null;
return el.getBoundingClientRect().top-scroll.getBoundingClientRect().top+scroll.scrollTop;
}
function getRowH(id){const el=document.getElementById('nr-'+id);return el?el.offsetHeight:34;}

function animateSlider(fromId,toId,onDone){
const pill=document.getElementById('sliderPill');
const svg=document.getElementById('railSvg');
const fromTop=fromId?getRowTop(fromId):0;
const fromH=fromId?getRowH(fromId):34;
const toTop=getRowTop(toId);
const toH=getRowH(toId);
if(toTop===null){if(onDone)onDone();return;}
const startY=fromTop??toTop,endY=toTop;
const dur=Math.min(Math.max(Math.abs(endY-startY)/280*1000+100,180),700);
pill.style.transition='none';pill.style.opacity='1';pill.style.height=fromH+'px';pill.style.transform=`translateY(${startY}px)`;
if(sliderAnimRAF)cancelAnimationFrame(sliderAnimRAF);
let start=null;
function step(ts){
if(!start)start=ts;
const t=Math.min((ts-start)/dur,1),ease=1-Math.pow(1-t,4);
const y=startY+(endY-startY)*ease,h=fromH+(toH-fromH)*ease;
pill.style.transform=`translateY(${y}px)`;pill.style.height=h+'px';
drawStreak(svg,startY+fromH/2,y+h/2);
if(t<1){sliderAnimRAF=requestAnimationFrame(step);}
else{
pill.style.transform=`translateY(${endY}px)`;pill.style.height=toH+'px';
const dot=pill.querySelector('.pill-dot');
dot.style.transition='box-shadow .2s,transform .2s';
dot.style.boxShadow='0 0 22px 10px rgba(245,158,11,0.8)';dot.style.transform='translateY(-50%) scale(1.8)';
setTimeout(()=>{dot.style.boxShadow='0 0 10px 4px rgba(245,158,11,0.5)';dot.style.transform='translateY(-50%) scale(1)';},220);
setTimeout(()=>{svg.innerHTML='';setTimeout(()=>{pill.style.transition='opacity .4s';pill.style.opacity='0';},300);if(onDone)onDone();},100);
}
}
sliderAnimRAF=requestAnimationFrame(step);
}

function drawStreak(svg,fromY,toY){
svg.innerHTML='';
if(Math.abs(toY-fromY)<1)return;
const x=5;
[[10,'rgba(245,158,11,0.25)'],[4,'rgba(245,158,11,0.55)'],[2,'#f59e0b']].forEach(([w,s])=>{
const l=document.createElementNS('http://www.w3.org/2000/svg','line');
l.setAttribute('x1',x);l.setAttribute('y1',fromY);l.setAttribute('x2',x);l.setAttribute('y2',toY);
l.setAttribute('stroke',s);l.setAttribute('stroke-width',w);l.setAttribute('stroke-linecap','round');
svg.appendChild(l);
});
}

function updateSvgSize(){
const scroll=document.getElementById('treeScroll');
const svg=document.getElementById('railSvg');
svg.setAttribute('height',Math.max(scroll.scrollHeight,600));
svg.setAttribute('width',scroll.offsetWidth||300);
}

function updateBreadcrumb(id){
const path=buildBreadcrumb(treeData,id);if(!path)return;
document.getElementById('breadcrumb').innerHTML=path.map((p,i)=>`<span class="crumb ${i===path.length-1?'active':''}">${p}</span>${i<path.length-1?'<span class="sep">›</span>':''}`).join('');
}

window.addEventListener('resize',updateSvgSize);
document.getElementById('memoArea').value=MEMO_TEXT;
renderTree();
</script>
