<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帳票類 ビューア</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0f14;--surface:#13161e;--surface2:#1a1e28;--border:#232736;
--accent:#f59e0b;--accent2:#a78bfa;--text:#e2e8f0;--text-muted:#64748b;
--text-dim:#94a3b8;--green:#34d399;--blue:#5b7fff;--hover:#1e2233;
--rail:#2a3045;--rail-active:#f59e0b;
--glow:rgba(245,158,11,0.5);--glow2:rgba(245,158,11,0.15);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden}

header{height:52px;background:var(–surface);border-bottom:1px solid var(–border);display:flex;align-items:center;padding:0 20px;gap:12px}
.logo{font-family:‘DM Mono’,monospace;font-size:15px;font-weight:500;color:var(–accent);letter-spacing:.08em}
.logo span{color:var(–accent2)}
.header-sep{width:1px;height:20px;background:var(–border);margin:0 4px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;flex:1;overflow:hidden;white-space:nowrap}
.breadcrumb .crumb{color:var(–text-dim)}
.breadcrumb .crumb.active{color:var(–text)}
.breadcrumb .sep{color:var(–border)}

.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 52px)}

/* ── Sidebar ── */
.sidebar{background:var(–surface);border-right:1px solid var(–border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-title{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(–text-muted)}

.tree-scroll{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
.tree-scroll::-webkit-scrollbar{width:4px}
.tree-scroll::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px}

#railSvg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:30;overflow:visible}

/* ── Slider pill ── */
#sliderPill{
position:absolute;left:0;top:0;width:100%;height:34px;
pointer-events:none;z-index:25;opacity:0;will-change:transform;
}
#sliderPill .pill-bg{
position:absolute;left:2px;right:0;top:3px;bottom:3px;
background:linear-gradient(90deg,rgba(245,158,11,0.22) 0%,rgba(245,158,11,0.07) 100%);
border-left:2px solid var(–accent);
border-radius:0 6px 6px 0;
}
#sliderPill .pill-shimmer{
position:absolute;left:2px;right:0;top:3px;bottom:3px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07) 50%,transparent);
border-radius:0 6px 6px 0;
animation:shimmer 1s infinite linear;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
#sliderPill .pill-dot{
position:absolute;left:-1px;top:50%;transform:translateY(-50%);
width:8px;height:8px;border-radius:50%;
background:var(–accent);
box-shadow:0 0 10px 4px var(–glow);
}

/* ── Tree nodes ── */
#treeRoot{position:relative;z-index:1;padding:8px 0}
.node{user-select:none}

/* Base row height — selected node expands */
.node-row{
display:flex;align-items:center;min-height:34px;height:34px;
cursor:pointer;transition:background .12s,height .3s cubic-bezier(.34,1.2,.64,1),min-height .3s cubic-bezier(.34,1.2,.64,1),padding .3s;
border-left:2px solid transparent;position:relative;overflow:hidden;
}
.node-row:hover{background:var(–hover)}

/* EXPANDED selected node */
.node-row.selected{
height:124px;min-height:124px;
background:linear-gradient(90deg,rgba(245,158,11,0.13) 0%,rgba(245,158,11,0.04) 100%);
border-left-color:var(–accent);
}

/* Label grows when selected */
.node-row .node-label{
font-size:13px;color:var(–text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
padding-right:6px;transition:color .2s,font-size .25s,font-weight .2s;
}
.node-row.selected .node-label{
color:var(–text);font-size:30px;font-weight:500;white-space:normal;
line-height:1.3;
}

/* Sub-info shown only on selected */
.node-row .node-sub{
position:absolute;bottom:8px;left:0;right:0;
font-size:11px;color:var(–accent);font-family:‘DM Mono’,monospace;
padding-left:0;opacity:0;transform:translateY(4px);
transition:opacity .25s .1s,transform .25s .1s;
pointer-events:none;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.node-row.selected .node-sub{opacity:1;transform:translateY(0)}

/* Indent segments */
.node-indent{flex-shrink:0;display:flex;align-items:flex-start;padding-top:10px}
.node-line-seg{width:20px;height:34px;position:relative;flex-shrink:0}
.node-line-seg::before{content:’’;position:absolute;left:10px;top:0;bottom:0;width:1.5px;background:var(–rail);transition:background .3s}
.node-line-seg.last::after{content:’’;position:absolute;left:10px;top:17px;width:10px;height:1.5px;background:var(–rail);transition:background .3s}
.node-line-seg.last::before{bottom:calc(100% - 17px)}
.node-line-seg.rail-lit::before{background:var(–rail-active);box-shadow:0 0 5px var(–glow)}
.node-line-seg.last.rail-lit::after{background:var(–rail-active);box-shadow:0 0 5px var(–glow)}

.chevron-wrap{width:20px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:0}
.chevron{width:14px;height:14px;border-radius:3px;background:var(–surface2);border:1px solid var(–border);display:flex;align-items:center;justify-content:center;transition:transform .2s,background .15s,border-color .15s}
.chevron svg{width:8px;height:8px;stroke:var(–text-muted)}
.node-row.selected .chevron{background:var(–accent);border-color:var(–accent)}
.node-row.selected .chevron svg{stroke:#0d0f14}
.chevron.open{transform:rotate(90deg)}
.leaf-icon{width:20px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.leaf-icon svg{width:12px;height:12px;stroke:var(–text-muted);transition:stroke .2s}
.node-row.selected .leaf-icon svg{stroke:var(–accent)}

.inline-upload{position:relative;width:22px;height:22px;display:none;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;margin-right:2px}
.node-row:hover .inline-upload,.node-row.selected .inline-upload{display:flex}
.inline-upload svg{width:11px;height:11px;stroke:var(–text-muted);pointer-events:none}
.inline-upload:hover svg{stroke:var(–accent)}
.inline-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}

.node-count{font-family:‘DM Mono’,monospace;font-size:10px;padding:1px 5px;border-radius:8px;background:var(–surface2);color:var(–text-muted);border:1px solid var(–border);margin-right:5px;flex-shrink:0}
.node-badge{font-size:10px;font-family:‘DM Mono’,monospace;padding:1px 6px;border-radius:10px;margin-right:10px;flex-shrink:0;transition:all .2s}
.badge-pdf{background:rgba(245,158,11,.12);color:var(–accent);border:1px solid rgba(245,158,11,.25)}
.badge-folder{background:rgba(167,139,250,.1);color:var(–accent2);border:1px solid rgba(167,139,250,.15)}
.badge-empty{background:rgba(100,116,139,.1);color:var(–text-muted);border:1px solid rgba(100,116,139,.2)}
.node-row.selected .badge-pdf{background:rgba(245,158,11,.2);box-shadow:0 0 8px rgba(245,158,11,.2)}

/* Right meta area aligned to top in expanded mode */
.node-meta{display:flex;align-items:center;align-self:flex-start;padding-top:8px;gap:4px}

.node-children{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.node-children.open{max-height:2000px}

/* ── Main ── */
.main{display:flex;flex-direction:column;background:var(–bg);overflow:hidden}
.toolbar{height:44px;background:var(–surface);border-bottom:1px solid var(–border);display:flex;align-items:center;padding:0 16px;gap:10px}
.toolbar-btn{height:28px;padding:0 10px;background:var(–surface2);border:1px solid var(–border);color:var(–text-dim);font-size:12px;font-family:‘Noto Sans JP’,sans-serif;border-radius:5px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.toolbar-btn:hover{background:var(–hover);color:var(–text);border-color:var(–accent)}
.toolbar-btn.accent{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.3);color:var(–accent)}
.toolbar-btn svg{width:12px;height:12px;stroke:currentColor}
.toolbar-sep{width:1px;height:20px;background:var(–border)}
.toolbar-spacer{flex:1}
.zoom-display{font-family:‘DM Mono’,monospace;font-size:12px;color:var(–text-muted);min-width:44px;text-align:center}

.pdf-container{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:32px;position:relative}
.pdf-container::-webkit-scrollbar{width:8px}
.pdf-container::-webkit-scrollbar-thumb{background:var(–border);border-radius:4px}
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .3s;pointer-events:none}
.empty-state.hidden{opacity:0;pointer-events:none}
.drop-zone{width:280px;border:1.5px dashed var(–border);border-radius:16px;padding:36px 28px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;pointer-events:all}
.drop-zone:hover,.drop-zone.drag{border-color:var(–accent);background:rgba(245,158,11,.04)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{width:52px;height:52px;border-radius:14px;background:var(–surface);border:1px solid var(–border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.drop-icon svg{width:24px;height:24px;stroke:var(–accent)}
.drop-title{font-size:14px;font-weight:500;color:var(–text);margin-bottom:6px}
.drop-sub{font-size:12px;color:var(–text-muted);line-height:1.7}
.drop-sub em{color:var(–accent);font-style:normal}
.drop-hint{font-size:11px;color:var(–text-muted);margin-top:10px;opacity:.6}
.empty-tip{font-size:12px;color:var(–text-muted);text-align:center;line-height:1.8}
.gdrive-prompt{width:300px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.gdrive-icon{width:56px;height:56px;border-radius:14px;background:var(–surface);border:1px solid var(–border);display:flex;align-items:center;justify-content:center}
.gdrive-icon svg{width:28px;height:28px}
.gdrive-title{font-size:14px;font-weight:500;color:var(–text)}
.gdrive-sub{font-size:12px;color:var(–text-muted);line-height:1.7}
.url-input-row{display:flex;gap:8px;margin-top:4px;width:100%}
.url-input-row .text-input{margin-bottom:0;flex:1}

.pdf-frame-wrap{opacity:0;transform:scale(.97) translateY(12px);transition:opacity .35s ease,transform .35s cubic-bezier(.34,1.2,.64,1);transform-origin:top center;width:100%;display:flex;justify-content:center}
.pdf-frame-wrap.visible{opacity:1;transform:scale(1) translateY(0)}
.pdf-shadow{box-shadow:0 0 0 1px var(–border),0 24px 80px rgba(0,0,0,.6);border-radius:6px;overflow:hidden;width:100%;max-width:860px;background:white}
iframe.pdf-frame{display:block;width:100%;border:none;height:900px}

.statusbar{height:24px;background:var(–surface);border-top:1px solid var(–border);display:flex;align-items:center;padding:0 16px;gap:16px}
.status-item{font-size:11px;font-family:‘DM Mono’,monospace;color:var(–text-muted);display:flex;align-items:center;gap:5px}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(–green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:24px;width:380px;transform:scale(.96) translateY(8px);transition:transform .25s cubic-bezier(.34,1.2,.64,1);box-shadow:0 32px 80px rgba(0,0,0,.6)}
.modal-backdrop.open .modal{transform:scale(1) translateY(0)}
.modal-title{font-size:14px;font-weight:500;margin-bottom:6px;color:var(–text)}
.modal-sub{font-size:12px;color:var(–text-muted);margin-bottom:18px;line-height:1.7}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.btn{height:32px;padding:0 14px;border-radius:6px;font-size:13px;font-family:‘Noto Sans JP’,sans-serif;cursor:pointer;transition:all .15s;border:1px solid var(–border)}
.btn-ghost{background:transparent;color:var(–text-muted)}
.btn-ghost:hover{background:var(–hover);color:var(–text)}
.btn-primary{background:var(–accent);color:#0d0f14;border-color:var(–accent);font-weight:600}
.btn-primary:hover{background:#d97706}
.text-input{width:100%;height:36px;background:var(–bg);border:1px solid var(–border);border-radius:6px;color:var(–text);font-size:13px;font-family:‘Noto Sans JP’,sans-serif;padding:0 12px;outline:none;transition:border-color .15s;margin-bottom:12px}
.text-input:focus{border-color:var(–accent)}
.radio-group{display:flex;gap:16px}
.radio-group label{font-size:12px;color:var(–text-muted);display:flex;align-items:center;gap:6px;cursor:pointer}
.radio-group input{accent-color:var(–accent)}

/* Memo bar */
.memo-bar{
flex-shrink:0;
background:var(–surface);
border-top:1px solid var(–border);
display:flex;
flex-direction:row;
align-items:stretch;
}
.memo-label{
font-size:11px;font-family:‘DM Mono’,monospace;
color:var(–text-muted);letter-spacing:.08em;
writing-mode:vertical-rl;
padding:10px 8px;
border-right:1px solid var(–border);
flex-shrink:0;
display:flex;align-items:center;justify-content:center;
background:var(–surface2);
}
.memo-area{
flex:1;
background:transparent;
border:none;
outline:none;
resize:none;
color:var(–text);
font-size:12px;
font-family:‘Noto Sans JP’,sans-serif;
line-height:1.7;
padding:10px 14px;
height:calc(1.7em * 5 + 20px);
min-height:calc(1.7em * 5 + 20px);
max-height:calc(1.7em * 5 + 20px);
}
.memo-area::placeholder{color:var(–text-muted)}
.memo-area:focus{background:rgba(245,158,11,.03)}
@media(max-width:640px){
.layout{grid-template-columns:1fr}
.sidebar{height:40vh;border-right:none;border-bottom:1px solid var(–border)}
.memo-bar{flex-direction:column}
.memo-label{
writing-mode:horizontal-tb;
border-right:none;border-bottom:1px solid var(–border);
padding:6px 14px;
justify-content:flex-start;
}
.memo-area{
height:calc(1.7em * 5 + 20px);
min-height:calc(1.7em * 5 + 20px);
}
}
</style>

</head>

<script>
let selectedNodeId = null;
let currentZoom = 100;
let nodeIdCounter = 20;
let sliderAnimRAF = null;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 備考欄テキスト（表示したい内容をここに書く）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MEMO_TEXT = `ここに備考を入力してください。
複数行も記述できます。`;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ツリー構造の設定
//
// 【親フォルダ】label と children を設定
// 【子ファイル】label と driveId（GoogleドライブのファイルID）を設定
//
// 111 = 親フォルダ
// 222 = 子ファイル（PDFリンク）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const treeData = [

// 111 親フォルダ
{id:1, label:'活動報告関連', type:'folder', open:true, children:[

// 222 子ファイル
{id:2, label:'活動報告原本', type:'leaf', driveId:'https://docs.google.com/spreadsheets/d/1xXEVHqV0e2dqRo6gyBkip1WW3779UonE/edit?usp=sharing&ouid=116428537516383520070&rtpof=true&sd=true'},

]},

// 111 親フォルダ
{id:4, label:'店所点検関連', type:'folder', open:false, children:[

// 222 子ファイル
{id:5, label:'報告書', type:'leaf', driveId:'https://docs.google.com/spreadsheets/d/1TdY65vML88sJRbZ5f_58HnBmeGo1z8fR/edit?usp=sharing&ouid=116428537516383520070&rtpof=true&sd=true'},

// 222 子ファイル
{id:5, label:'報告書２', type:'leaf', driveId:'https://docs.google.com/spreadsheets/d/1HuCHOLXoz-rxTZzdgQN1AkxCFkgJQC2a/edit?usp=sharing&ouid=116428537516383520070&rtpof=true&sd=true'},
  
// 111 親フォルダ
{id:4, label:'添乗関連', type:'folder', open:false, children:[

// 222 子ファイル
{id:5, label:'見極めシート', type:'leaf', driveId:'https://docs.google.com/document/d/1S0NxBVbF08ADyxOBUtbwiP2iGXCs3_lC/edit?usp=sharing&ouid=116428537516383520070&rtpof=true&sd=true'},
]},

];

function findNode(nodes,id){for(const n of nodes){if(n.id===id)return n;if(n.children){const f=findNode(n.children,id);if(f)return f;}}return null;}
function countLeaves(n){if(n.type==='leaf')return 1;return(n.children||[]).reduce((s,c)=>s+countLeaves(c),0);}
function buildBreadcrumb(nodes,id,p=[]){for(const n of nodes){if(n.id===id)return[...p,n.label];if(n.children){const r=buildBreadcrumb(n.children,id,[...p,n.label]);if(r)return r;}}return null;}
function findPath(nodes,id,p=[]){for(const n of nodes){const np=[...p,n.id];if(n.id===id)return np;if(n.children){const r=findPath(n.children,id,np);if(r)return r;}}return null;}
function getNodeSubText(node){
if(node.type==='folder') return countLeaves(node) + ' ファイル';
return node.driveId ? 'クリックして表示' : 'ファイル未設定';
}

function renderTree(hlPath){
const root=document.getElementById('treeRoot');
root.innerHTML='';
renderNodes(treeData,root,0,true,hlPath||[]);
updateSvgSize();
}
function renderNodes(nodes,container,depth,isRoot,hlPath){
nodes.forEach((n,i)=>container.appendChild(createNodeEl(n,depth,i===nodes.length-1,isRoot,hlPath)));
}
function createNodeEl(node,depth,isLast,isRoot,hlPath){
const wrapper=document.createElement('div');
wrapper.className='node';
const isSel=selectedNodeId===node.id;
const row=document.createElement('div');
row.className='node-row'+(isSel?' selected':'');
row.id='nr-'+node.id;

// indent
const indent=document.createElement('div');
indent.className='node-indent';
indent.style.display='flex';
if(!isRoot){const p=document.createElement('div');p.style.width='16px';indent.appendChild(p);}
for(let i=0;i<depth-1;i++){const s=document.createElement('div');s.className='node-line-seg';indent.appendChild(s);}
if(depth>0){const lit=hlPath.includes(node.id);const s=document.createElement('div');s.className='node-line-seg last'+(lit?' rail-lit':'');indent.appendChild(s);}

if(node.type==='folder'){
const cw=document.createElement('div');cw.className='chevron-wrap';
const ch=document.createElement('div');ch.className='chevron'+(node.open?' open':'');
ch.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
cw.appendChild(ch);indent.appendChild(cw);
} else {
const li=document.createElement('div');li.className='leaf-icon';
li.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
indent.appendChild(li);
}
row.appendChild(indent);

// label + sub
const labelWrap=document.createElement('div');
labelWrap.style.cssText='flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding-right:6px;min-width:0';
const label=document.createElement('div');label.className='node-label';label.textContent=node.label;labelWrap.appendChild(label);
const sub=document.createElement('div');sub.className='node-sub';sub.textContent=getNodeSubText(node);
// indent sub text by the indent amount
sub.style.paddingLeft=(depth>0?(isRoot?0:16)+depth*20+20:4)+'px';
labelWrap.appendChild(sub);
row.appendChild(labelWrap);

// meta (badge + upload)
const meta=document.createElement('div');meta.className='node-meta';

if(node.type==='folder'){
const cnt=document.createElement('span');cnt.className='node-count';cnt.textContent=countLeaves(node);meta.appendChild(cnt);
const fb=document.createElement('span');fb.className='node-badge badge-folder';fb.textContent='フォルダ';meta.appendChild(fb);
} else {
const pb=document.createElement('span');pb.className='node-badge '+(node.driveId?'badge-pdf':'badge-empty');pb.textContent=node.driveId?'GDrive':'空';meta.appendChild(pb);
}
row.appendChild(meta);

row.addEventListener('click',()=>handleNodeClick(node));
wrapper.appendChild(row);

if(node.type==='folder'&&node.children){
const cw=document.createElement('div');cw.className='node-children'+(node.open?' open':'');
renderNodes(node.children,cw,depth+1,false,hlPath);wrapper.appendChild(cw);
}
return wrapper;
}

// ── Slider animation (yellow) ──
function getRowTop(nodeId){
const el=document.getElementById('nr-'+nodeId);
const scroll=document.getElementById('treeScroll');
if(!el||!scroll)return null;
return el.getBoundingClientRect().top - scroll.getBoundingClientRect().top + scroll.scrollTop;
}
function getRowH(nodeId){
const el=document.getElementById('nr-'+nodeId);
return el?el.offsetHeight:34;
}

function animateSlider(fromId,toId,onDone){
const pill=document.getElementById('sliderPill');
const scroll=document.getElementById('treeScroll');
const svg=document.getElementById('railSvg');

const fromTop=fromId?getRowTop(fromId):0;
const fromH=fromId?getRowH(fromId):34;
const toTop=getRowTop(toId);
const toH=getRowH(toId);
if(toTop===null){if(onDone)onDone();return;}

const startY=fromTop??toTop;
const endY=toTop;
const SPEED=280;
const dist=Math.abs(endY-startY);
const dur=Math.min(Math.max(dist/SPEED*1000+100,180),700);

pill.style.transition='none';
pill.style.opacity='1';
pill.style.height=fromH+'px';
pill.style.transform=`translateY(${startY}px)`;

if(sliderAnimRAF)cancelAnimationFrame(sliderAnimRAF);

let start=null;
function step(ts){
if(!start)start=ts;
const t=Math.min((ts-start)/dur,1);
const ease=easeOutQuart(t);
const y=startY+(endY-startY)*ease;
const h=fromH+(toH-fromH)*ease;

pill.style.transform=`translateY(${y}px)`;
pill.style.height=h+'px';
drawStreak(svg,startY+fromH/2,y+h/2);

if(t<1){
sliderAnimRAF=requestAnimationFrame(step);
} else {
pill.style.transform=`translateY(${endY}px)`;
pill.style.height=toH+'px';
arrivalPulse();
setTimeout(()=>{
svg.innerHTML='';
setTimeout(()=>{pill.style.transition='opacity .4s';pill.style.opacity='0';},300);
if(onDone)onDone();
},100);
}
}
sliderAnimRAF=requestAnimationFrame(step);
}

function drawStreak(svg,fromY,toY){
svg.innerHTML='';
if(Math.abs(toY-fromY)<1)return;
const x=5;
// outer glow
const g=document.createElementNS('http://www.w3.org/2000/svg','line');
g.setAttribute('x1',x);g.setAttribute('y1',fromY);g.setAttribute('x2',x);g.setAttribute('y2',toY);
g.setAttribute('stroke','rgba(245,158,11,0.25)');g.setAttribute('stroke-width','10');g.setAttribute('stroke-linecap','round');
svg.appendChild(g);
// mid glow
const m=document.createElementNS('http://www.w3.org/2000/svg','line');
m.setAttribute('x1',x);m.setAttribute('y1',fromY);m.setAttribute('x2',x);m.setAttribute('y2',toY);
m.setAttribute('stroke','rgba(245,158,11,0.55)');m.setAttribute('stroke-width','4');m.setAttribute('stroke-linecap','round');
svg.appendChild(m);
// core
const l=document.createElementNS('http://www.w3.org/2000/svg','line');
l.setAttribute('x1',x);l.setAttribute('y1',fromY);l.setAttribute('x2',x);l.setAttribute('y2',toY);
l.setAttribute('stroke','#f59e0b');l.setAttribute('stroke-width','2');l.setAttribute('stroke-linecap','round');
svg.appendChild(l);
}

function arrivalPulse(){
const dot=document.querySelector('#sliderPill .pill-dot');
if(!dot)return;
dot.style.transition='box-shadow .2s,transform .2s';
dot.style.boxShadow='0 0 22px 10px rgba(245,158,11,0.8)';
dot.style.transform='translateY(-50%) scale(1.8)';
setTimeout(()=>{dot.style.boxShadow='0 0 10px 4px rgba(245,158,11,0.5)';dot.style.transform='translateY(-50%) scale(1)';},220);
}

function easeOutQuart(t){return 1-Math.pow(1-t,4);}

function updateSvgSize(){
const scroll=document.getElementById('treeScroll');
const svg=document.getElementById('railSvg');
svg.setAttribute('height',Math.max(scroll.scrollHeight,600));
svg.setAttribute('width',scroll.offsetWidth||300);
}

// ── Click handler ──
function handleNodeClick(node){
const prevId=selectedNodeId;
selectedNodeId=node.id;

if(node.type==='folder')node.open=!node.open;
const path=findPath(treeData,node.id)||[];
path.slice(0,-1).forEach(id=>{const n=findNode(treeData,id);if(n&&n.type==='folder')n.open=true;});

// Render to reveal rows
renderTree(path);

requestAnimationFrame(()=>{
animateSlider(prevId,node.id,()=>{
renderTree(path);
updateBreadcrumb(node.id);
if(node.type==='leaf'){

if(node.driveId)loadPdf(getDriveEmbedUrl(node.driveId)); else showEmpty();
} else {

}
});
});
}

// ── PDF ──
function showEmpty(){document.getElementById('pdfWrap').classList.remove('visible');document.getElementById('emptyState').classList.remove('hidden');}
function loadPdf(url){
const wrap=document.getElementById('pdfWrap'),frame=document.getElementById('pdfFrame'),empty=document.getElementById('emptyState');
wrap.classList.remove('visible');empty.classList.add('hidden');
setTimeout(()=>{frame.src=url;applyZoomFrame();setTimeout(()=>wrap.classList.add('visible'),60);},200);
}
function getDriveEmbedUrl(fileId){
return 'https://drive.google.com/file/d/' + fileId + '/preview';
}

// ── Zoom ──
function zoomIn(){currentZoom=Math.min(200,currentZoom+10);applyZoom();}
function zoomOut(){currentZoom=Math.max(50,currentZoom-10);applyZoom();}
function resetZoom(){currentZoom=100;applyZoom();}
function applyZoom(){document.getElementById('zoomDisplay').textContent=currentZoom+'%';applyZoomFrame();}
function applyZoomFrame(){document.getElementById('pdfShadow').style.maxWidth=Math.round(860*currentZoom/100)+'px';document.getElementById('pdfFrame').style.height=Math.round(900*currentZoom/100)+'px';}

function updateBreadcrumb(id){
const path=buildBreadcrumb(treeData,id);if(!path)return;
document.getElementById('breadcrumb').innerHTML=path.map((p,i)=>`<span class="crumb ${i===path.length-1?'active':''}">${p}</span>${i<path.length-1?'<span class="sep">›</span>':''}`).join('');
}
function collapseAll(){
function c(n){n.forEach(x=>{if(x.type==='folder'){x.open=false;if(x.children)c(x.children);}});}
c(treeData);selectedNodeId=null;
document.getElementById('sliderPill').style.opacity='0';
renderTree();
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

if(selectedNodeId){const sel=findNode(treeData,selectedNodeId);if(sel&&sel.type==='folder'){sel.children.push(n);sel.open=true;}else treeData.push(n);}else treeData.push(n);
renderTree();
}
document.querySelectorAll('.modal-backdrop').forEach(bd=>bd.addEventListener('click',e=>{if(e.target===bd)bd.classList.remove('open');}));
window.addEventListener('resize',updateSvgSize);
renderTree();
document.getElementById("memoArea").value = MEMO_TEXT;
</script>
